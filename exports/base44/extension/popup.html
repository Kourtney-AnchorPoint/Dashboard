<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      background: #07070F;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }
    .header {
      padding: 20px;
      background: linear-gradient(135deg, rgba(212,21,154,0.2), rgba(136,68,232,0.15));
      border-bottom: 1px solid rgba(212,21,154,0.3);
      text-align: center;
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #D4159A, #8844E8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      font-size: 10px;
      color: #10D8F0;
      letter-spacing: 2px;
      margin-top: 4px;
      opacity: 0.8;
    }
    .body { padding: 20px; }
    .btn-main {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #D4159A, #8844E8);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
      transition: opacity 0.2s;
    }
    .btn-main:hover { opacity: 0.9; }
    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.07);
      margin: 16px 0;
    }
    .section-label {
      font-size: 10px;
      color: #666;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .api-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      padding: 10px 12px;
      font-size: 12px;
      outline: none;
      margin-bottom: 8px;
      font-family: monospace;
    }
    .api-input:focus { border-color: rgba(212,21,154,0.5); }
    .api-input::placeholder { color: #444; }
    .btn-save {
      width: 100%;
      padding: 9px;
      background: rgba(212,21,154,0.15);
      border: 1px solid rgba(212,21,154,0.4);
      border-radius: 8px;
      color: #D4159A;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-save:hover { background: rgba(212,21,154,0.25); }
    .status {
      font-size: 11px;
      margin-top: 8px;
      text-align: center;
      min-height: 16px;
      color: #10D8F0;
    }
    .footer {
      padding: 12px 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 10px;
      color: rgba(255,255,255,0.15);
      text-align: center;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">✦ VEGA</div>
    <div class="tagline">ANCHORPOINT AI ASSISTANT</div>
  </div>
  <div class="body">
    <button class="btn-main" id="open-sidebar">Open Vega on This Page</button>

    <hr class="divider">

    <div class="section-label">⚙️ Settings</div>
    <input
      type="password"
      class="api-input"
      id="api-key-input"
      placeholder="Anthropic API Key (sk-ant-...)"
    />
    <button class="btn-save" id="save-key">Save API Key</button>
    <div class="status" id="status"></div>
  </div>
  <div class="footer">Powered by AnchorPoint Health Systems · v1.0</div>
  <script src="popup.js"></script>
</body>
</html>
